name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip build
      - run: python -m unittest discover -s tests -v
      - run: python -m warden_drydock --help
      - run: python -m build
      - name: Smoke-test clean AI onboarding boundary
        if: ${{ matrix.python-version == '3.11' }}
        run: |
          ONBOARDING_ROOT="$(mktemp -d)"
          CAMPAIGN="$ONBOARDING_ROOT/campaign"
          ENVIRONMENT="$ONBOARDING_ROOT/environment"
          mkdir "$CAMPAIGN"
          python -m venv "$ENVIRONMENT"
          "$ENVIRONMENT/bin/python" -m pip install .
          test "$("$ENVIRONMENT/bin/python" -m warden_drydock --version)" = "Warden Drydock 0.2.0"
          "$ENVIRONMENT/bin/python" -m warden_drydock bootstrap "$CAMPAIGN" --adapter mothership --name "CI Onboarding"
          "$ENVIRONMENT/bin/python" "$CAMPAIGN/scripts/drydock.py" validate
          test ! -d "$CAMPAIGN/.git"
